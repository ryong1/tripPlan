<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여행 플래너</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kirang+Haerang&family=Noto+Sans+KR:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1f2e52" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="여행 플래너" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <svg class="bg-art" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <g fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M100,170 C 420,50 920,110 1350,50" stroke-dasharray="1 18" stroke-width="4" />
      <circle cx="1350" cy="50" r="7" fill="currentColor" stroke="none" />
      <circle cx="1150" cy="150" r="48" />
      <path d="M-20,830 L230,600 L380,730 L590,470 L800,770 L1010,560 L1230,790 L1460,610" />
      <path d="M120,470 q40,-34 80,0 q40,-30 80,0" />
      <path d="M980,300 q40,-34 80,0 q40,-30 80,0" />
    </g>
  </svg>
  <div id="landing" class="landing">
    <div class="landing-card">
      <h1>여행 플래너</h1>
      <p class="sub">친구들과 함께 실시간으로 여행 계획을 세워요</p>
      <div class="field">
        <label>내 이름</label>
        <input id="nameInput" type="text" placeholder="이름" maxlength="30" />
      </div>
      <div id="recentWrap" class="recent-wrap hidden">
        <label class="recent-label">이어서 계획하기</label>
        <div id="recentList"></div>
      </div>
      <div class="landing-actions">
        <div class="field">
          <label>새 여행 만들기</label>
          <input id="tripNameInput" type="text" placeholder="여행 이름" maxlength="100" />
          <input id="destInput" type="text" placeholder="어디로 가나요?" maxlength="100" style="margin-top:8px" />
          <div class="row" style="margin-top:8px">
            <div class="field" style="flex:1;margin:0">
              <label style="font-weight:400">출발일</label>
              <input id="startInput" type="date" />
            </div>
            <div class="field" style="flex:1;margin:0">
              <label style="font-weight:400">도착일(마지막날)</label>
              <input id="endInput" type="date" />
            </div>
          </div>
          <button id="createBtn" class="primary" style="width:100%;margin-top:10px">여행 만들기</button>
        </div>
        <div class="or">또는</div>
        <div class="field">
          <label>기존 여행 참여</label>
          <div class="row">
            <input id="joinIdInput" type="text" placeholder="여행 코드 또는 링크" />
            <button id="joinBtn">참여</button>
          </div>
        </div>
      </div>
      <p id="landingError" class="error"></p>
    </div>
  </div>
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="trip-title">
        <input id="tripTitle" class="trip-title-input" readonly />
        <div id="tripSub" class="trip-sub"></div>
      </div>
      <div class="topbar-right">
        <span id="presence" class="presence">● 1명 접속</span>
        <button id="editTitleBtn" class="ghost" title="여행 정보 수정">수정</button>
        <button id="themeBtn" class="ghost">테마</button>
        <button id="homeBtn" class="ghost">내 여행</button>
        <button id="shareBtn" class="ghost">공유</button>
      </div>
    </header>
    <nav class="tabs">
      <button class="tab active" data-tab="plan">여행 계획</button>
      <button class="tab" data-tab="expenses">경비정산</button>
      <button class="tab" data-tab="packing">준비물</button>
      <button class="tab" data-tab="recap">여행 요약</button>
    </nav>
    <main class="content">
      <section id="tab-plan" class="tabpane active">
        <section id="tab-map"></section>
        <section id="tab-itinerary"></section>
      </section>
      <section id="tab-expenses" class="tabpane"></section>
      <section id="tab-packing" class="tabpane"></section>
      <section id="tab-recap" class="tabpane"></section>
    </main>
  </div>
  <div id="shareModal" class="modal hidden">
    <div class="modal-card">
      <h3>함께할 사람 초대</h3>
      <p class="sub">아래 링크를 카톡 등으로 공유하세요. 링크를 연 사람은 바로 같이 편집할 수 있어요.</p>
      <div class="row">
        <input id="shareLink" type="text" readonly />
        <button id="copyBtn" class="primary">복사</button>
      </div>
      <button id="copyPlanBtn" class="ghost" style="width:100%;margin-top:10px">확정 일정 텍스트 복사 (카톡용)</button>
      <div class="member-colors-label">멤버 색상 (색을 눌러 변경)</div>
      <div id="memberColors"></div>
      <button id="closeShare" class="ghost close-modal">닫기</button>
    </div>
  </div>
  <div id="themeModal" class="modal hidden">
    <div class="modal-card">
      <h3>테마 선택</h3>
      <p class="sub">앱 색상을 바꿔요. 이 기기에 저장됩니다.</p>
      <div id="themeOpts" class="theme-opts"></div>
      <button id="closeTheme" class="ghost close-modal">닫기</button>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- 앱 스크립트 (전역 스코프 공유, 순서대로 로드) -->
  <script src="js/core.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/map.js"></script>
  <script src="js/itinerary.js"></script>
  <script src="js/recs.js"></script>
  <script src="js/panels.js"></script>
</body>
</html>
