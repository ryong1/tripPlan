# Render 무료 배포 설정 (Blueprint). https://render.com 에서 이 저장소를 연결하면 자동 인식됩니다.
services:
  - type: web
    name: travel-planner
    runtime: node
    plan: free
    buildCommand: npm install --omit=dev
    startCommand: npm start
    envVars:
      - key: ODSAY_API_KEY   # 대중교통(ODsay) 키 — Render 대시보드에서 값 입력 (코드/깃에는 저장 안 함)
        sync: false
